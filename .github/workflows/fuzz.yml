name: Fuzz

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'src/tart.rs'
      - 'fuzz/**'
      - '.github/workflows/fuzz.yml'
  schedule:
    # Daily 04:00 UTC — longer fuzz session against latest main.
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fuzz-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fuzz:
    name: cargo-fuzz (parse_list_json)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install Rust nightly toolchain (required by cargo-fuzz)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: nightly

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: |
            .
            fuzz

      - name: Install cargo-fuzz
        uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145  # v2
        with:
          tool: cargo-fuzz

      - name: Build fuzz target (smoke test compilation)
        working-directory: fuzz
        # cargo-fuzz defaults to x86_64-unknown-linux-musl on Linux, but
        # the sanitizer LLVM passes require dynamic libc, so musl fails
        # with "sanitizer is incompatible with statically linked libc".
        # Force GNU explicitly.
        run: cargo +nightly fuzz build --target x86_64-unknown-linux-gnu parse_list_json

      - name: Run parse_list_json
        working-directory: fuzz
        env:
          # On push/PR, ~30s is enough to catch shallow bugs without
          # holding up the merge queue. On the nightly cron we extend
          # to ~10min for deeper coverage.
          FUZZ_DURATION: ${{ github.event_name == 'schedule' && '600' || '30' }}
        run: |
          set -euo pipefail
          cargo +nightly fuzz run --target x86_64-unknown-linux-gnu parse_list_json -- \
            -max_total_time="${FUZZ_DURATION}" \
            -print_final_stats=1

      - name: Upload fuzz crash artifacts (if any)
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: fuzz-artifacts
          path: |
            fuzz/artifacts/
            fuzz/corpus/
          retention-days: 14
