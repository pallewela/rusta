name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build & publish (macOS arm64)
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      - name: Sync Cargo.toml version to tag
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i.bak -E "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml
          rm Cargo.toml.bak

      - name: Build release binary
        run: cargo build --release

      - name: Install cargo-cyclonedx
        uses: taiki-e/install-action@3771e22aa892e03fd35585fae288baad1755695c  # v2
        with:
          tool: cargo-cyclonedx

      - name: Generate SBOM (CycloneDX)
        id: sbom
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          SBOM="rusta-${TAG}-sbom.cdx.json"
          cargo cyclonedx --format json --override-filename "rusta-${TAG}-sbom.cdx"
          test -f "${SBOM}"
          echo "file=${SBOM}" >> "${GITHUB_OUTPUT}"

      - name: Package tarball
        id: pkg
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          ARCHIVE="rusta-${TAG}-aarch64-apple-darwin.tar.gz"
          tar -C target/release -czf "${ARCHIVE}" rusta
          SHA256="$(shasum -a 256 "${ARCHIVE}" | awk '{print $1}')"
          {
            echo "archive=${ARCHIVE}"
            echo "sha256=${SHA256}"
            echo "tag=${TAG}"
          } >> "${GITHUB_OUTPUT}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3
        with:
          files: |
            ${{ steps.pkg.outputs.archive }}
            ${{ steps.sbom.outputs.file }}
          generate_release_notes: true
          body: |
            ## Install via Homebrew

            ```sh
            brew install pallewela/tap/rusta
            ```

            ## Manual install

            ```sh
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ steps.pkg.outputs.tag }}/${{ steps.pkg.outputs.archive }} -o rusta.tar.gz
            tar -xzf rusta.tar.gz
            install -m 0755 rusta /usr/local/bin/rusta
            ```

            **SHA256** (`${{ steps.pkg.outputs.archive }}`):
            ```
            ${{ steps.pkg.outputs.sha256 }}
            ```

      - name: Check tap token presence
        id: tap
        env:
          TAP_REPO_TOKEN: ${{ secrets.TAP_REPO_TOKEN }}
        run: |
          if [ -n "${TAP_REPO_TOKEN:-}" ]; then
            echo "present=true" >> "${GITHUB_OUTPUT}"
          else
            echo "present=false" >> "${GITHUB_OUTPUT}"
            echo "TAP_REPO_TOKEN secret is not set; skipping Homebrew tap bump." >&2
          fi

      - name: Bump Homebrew tap formula
        if: steps.tap.outputs.present == 'true'
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697  # v4
        with:
          token: ${{ secrets.TAP_REPO_TOKEN }}
          repository: pallewela/homebrew-tap
          event-type: rusta-release
          client-payload: |
            {
              "tag": "${{ steps.pkg.outputs.tag }}",
              "archive": "${{ steps.pkg.outputs.archive }}",
              "sha256": "${{ steps.pkg.outputs.sha256 }}",
              "url": "https://github.com/${{ github.repository }}/releases/download/${{ steps.pkg.outputs.tag }}/${{ steps.pkg.outputs.archive }}"
            }

      - name: Check crates.io token presence
        id: crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -n "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "present=true" >> "${GITHUB_OUTPUT}"
          else
            echo "present=false" >> "${GITHUB_OUTPUT}"
            echo "CARGO_REGISTRY_TOKEN secret is not set; skipping crates.io publish." >&2
          fi

      - name: Publish to crates.io
        if: steps.crates.outputs.present == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --allow-dirty --no-verify
