name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build & package (macOS arm64)
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.pkg.outputs.tag }}
      archive: ${{ steps.pkg.outputs.archive }}
      sbom: ${{ steps.sbom.outputs.file }}
      sha256: ${{ steps.pkg.outputs.sha256 }}
      digests: ${{ steps.hash.outputs.digests }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      - name: Sync Cargo.toml version to tag
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i.bak -E "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml
          rm Cargo.toml.bak

      - name: Build release binary
        run: cargo build --release

      - name: Generate shell completions and man pages
        run: |
          set -euo pipefail
          BIN=./target/release/rusta
          OUT=target/release/share
          mkdir -p \
            "$OUT/man/man1" \
            "$OUT/bash-completion/completions" \
            "$OUT/zsh/site-functions" \
            "$OUT/fish/vendor_completions.d"
          "$BIN" completions bash > "$OUT/bash-completion/completions/rusta"
          "$BIN" completions zsh  > "$OUT/zsh/site-functions/_rusta"
          "$BIN" completions fish > "$OUT/fish/vendor_completions.d/rusta.fish"
          "$BIN" man "$OUT/man/man1"

      - name: Install cargo-cyclonedx
        uses: taiki-e/install-action@c93ccc03e00cd0e08e494f5fd058a6c55a6a1907  # v2
        with:
          tool: cargo-cyclonedx

      - name: Generate SBOM (CycloneDX)
        id: sbom
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          SBOM="rusta-${TAG}-sbom.cdx.json"
          cargo cyclonedx --format json --override-filename "rusta-${TAG}-sbom.cdx"
          test -f "${SBOM}"
          echo "file=${SBOM}" >> "${GITHUB_OUTPUT}"

      - name: Package tarball
        id: pkg
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          ARCHIVE="rusta-${TAG}-aarch64-apple-darwin.tar.gz"
          tar -C target/release -czf "${ARCHIVE}" rusta share
          SHA256="$(shasum -a 256 "${ARCHIVE}" | awk '{print $1}')"
          {
            echo "archive=${ARCHIVE}"
            echo "sha256=${SHA256}"
            echo "tag=${TAG}"
          } >> "${GITHUB_OUTPUT}"

      - name: Compute SLSA subject digests
        id: hash
        env:
          ARCHIVE: ${{ steps.pkg.outputs.archive }}
          SBOM: ${{ steps.sbom.outputs.file }}
        run: |
          set -euo pipefail
          echo "digests=$(shasum -a 256 "$ARCHIVE" "$SBOM" | base64 | tr -d '\n')" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts for release job
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: release-artifacts
          path: |
            ${{ steps.pkg.outputs.archive }}
            ${{ steps.sbom.outputs.file }}
          retention-days: 1

      - name: Check crates.io token presence
        id: crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -n "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "present=true" >> "${GITHUB_OUTPUT}"
          else
            echo "present=false" >> "${GITHUB_OUTPUT}"
            echo "CARGO_REGISTRY_TOKEN secret is not set; skipping crates.io publish." >&2
          fi

      - name: Publish to crates.io
        if: steps.crates.outputs.present == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --allow-dirty --no-verify

  provenance:
    # SLSA reusable workflows MUST be referenced by tag, never by SHA,
    # because slsa-verifier requires the tag to anchor its trust check.
    # Pinning to SHA breaks downstream provenance verification.
    # See SECURITY-EXCEPTIONS.md for the full rationale and the
    # corresponding Scorecard Pinned-Dependencies alert dismissal.
    #
    # upload-assets is intentionally false: GitHub releases became
    # immutable in 2026-02; attempting to add the provenance file after
    # the release is created errors with "Cannot upload assets to an
    # immutable release". Instead, the generator publishes the provenance
    # as a workflow artifact, which the release job downloads and
    # includes in the single Release creation call.
    needs: build
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.build.outputs.digests }}
      upload-assets: false

  release:
    name: Publish GitHub Release
    needs: [build, provenance]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download build artifacts (tarball + SBOM)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: release-artifacts

      - name: Download provenance artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: ${{ needs.provenance.outputs.provenance-name }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3
        with:
          files: |
            ${{ needs.build.outputs.archive }}
            ${{ needs.build.outputs.sbom }}
            ${{ needs.provenance.outputs.provenance-name }}
          generate_release_notes: true
          body: |
            ## Install via Homebrew

            ```sh
            brew install pallewela/tap/rusta
            ```

            If you have an older version installed, refresh the tap before
            upgrading — `brew upgrade` does not pull tap updates on its own:

            ```sh
            brew update
            brew upgrade rusta
            ```

            ## Manual install

            ```sh
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ needs.build.outputs.tag }}/${{ needs.build.outputs.archive }} -o rusta.tar.gz
            tar -xzf rusta.tar.gz
            install -m 0755 rusta /usr/local/bin/rusta
            ```

            **SHA256** (`${{ needs.build.outputs.archive }}`):
            ```
            ${{ needs.build.outputs.sha256 }}
            ```

            ## Verifying provenance (SLSA)

            Each release ships a Sigstore-signed in-toto attestation
            (`*.intoto.jsonl`). Verify with
            [slsa-verifier](https://github.com/slsa-framework/slsa-verifier):

            ```sh
            slsa-verifier verify-artifact rusta.tar.gz \
              --provenance-path multiple.intoto.jsonl \
              --source-uri github.com/${{ github.repository }} \
              --source-tag ${{ needs.build.outputs.tag }}
            ```

      - name: Check tap token presence
        id: tap
        env:
          TAP_REPO_TOKEN: ${{ secrets.TAP_REPO_TOKEN }}
        run: |
          if [ -n "${TAP_REPO_TOKEN:-}" ]; then
            echo "present=true" >> "${GITHUB_OUTPUT}"
          else
            echo "present=false" >> "${GITHUB_OUTPUT}"
            echo "TAP_REPO_TOKEN secret is not set; skipping Homebrew tap bump." >&2
          fi

      - name: Bump Homebrew tap formula
        if: steps.tap.outputs.present == 'true'
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697  # v4
        with:
          token: ${{ secrets.TAP_REPO_TOKEN }}
          repository: pallewela/homebrew-tap
          event-type: rusta-release
          client-payload: |
            {
              "tag": "${{ needs.build.outputs.tag }}",
              "archive": "${{ needs.build.outputs.archive }}",
              "sha256": "${{ needs.build.outputs.sha256 }}",
              "url": "https://github.com/${{ github.repository }}/releases/download/${{ needs.build.outputs.tag }}/${{ needs.build.outputs.archive }}"
            }

      # repository-dispatch returns success once the API accepts the event
      # (HTTP 204); it does not wait for, or report on, the receiving
      # workflow. Poll the tap formula directly so a successful release
      # here implies a tap actually updated to this version + sha256. If
      # the tap dispatch silently no-ops (token revoked, tap workflow
      # broken, sed mismatch, branch protection rejection), this step
      # fails the release loudly instead of letting brew quietly lag.
      - name: Verify Homebrew tap formula updated
        if: steps.tap.outputs.present == 'true'
        env:
          GH_TOKEN: ${{ secrets.TAP_REPO_TOKEN }}
          TAG: ${{ needs.build.outputs.tag }}
          EXPECTED_SHA256: ${{ needs.build.outputs.sha256 }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          for attempt in $(seq 1 18); do
            content=$(gh api \
              "repos/pallewela/homebrew-tap/contents/Formula/rusta.rb" \
              --jq .content | base64 -d 2>/dev/null || true)
            if printf '%s\n' "$content" | grep -qE "^  version \"${VERSION}\"\$" \
               && printf '%s\n' "$content" | grep -qiE "^  sha256 \"${EXPECTED_SHA256}\"\$"; then
              echo "Tap formula updated to ${VERSION}."
              exit 0
            fi
            echo "Formula not yet at ${VERSION} (attempt ${attempt}/18); sleeping 10s..."
            sleep 10
          done
          echo "::error::Tap formula did not update to ${VERSION} within 3 minutes." >&2
          exit 1

