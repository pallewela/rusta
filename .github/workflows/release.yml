name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build & package (macOS arm64)
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.pkg.outputs.tag }}
      archive: ${{ steps.pkg.outputs.archive }}
      sbom: ${{ steps.sbom.outputs.file }}
      sha256: ${{ steps.pkg.outputs.sha256 }}
      digests: ${{ steps.hash.outputs.digests }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      - name: Sync Cargo.toml version to tag
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i.bak -E "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml
          rm Cargo.toml.bak

      - name: Build release binary
        run: cargo build --release

      - name: Install cargo-cyclonedx
        uses: taiki-e/install-action@3771e22aa892e03fd35585fae288baad1755695c  # v2
        with:
          tool: cargo-cyclonedx

      - name: Generate SBOM (CycloneDX)
        id: sbom
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          SBOM="rusta-${TAG}-sbom.cdx.json"
          cargo cyclonedx --format json --override-filename "rusta-${TAG}-sbom.cdx"
          test -f "${SBOM}"
          echo "file=${SBOM}" >> "${GITHUB_OUTPUT}"

      - name: Package tarball
        id: pkg
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          ARCHIVE="rusta-${TAG}-aarch64-apple-darwin.tar.gz"
          tar -C target/release -czf "${ARCHIVE}" rusta
          SHA256="$(shasum -a 256 "${ARCHIVE}" | awk '{print $1}')"
          {
            echo "archive=${ARCHIVE}"
            echo "sha256=${SHA256}"
            echo "tag=${TAG}"
          } >> "${GITHUB_OUTPUT}"

      - name: Compute SLSA subject digests
        id: hash
        env:
          ARCHIVE: ${{ steps.pkg.outputs.archive }}
          SBOM: ${{ steps.sbom.outputs.file }}
        run: |
          set -euo pipefail
          echo "digests=$(shasum -a 256 "$ARCHIVE" "$SBOM" | base64 | tr -d '\n')" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts for release job
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: release-artifacts
          path: |
            ${{ steps.pkg.outputs.archive }}
            ${{ steps.sbom.outputs.file }}
          retention-days: 1

      - name: Check crates.io token presence
        id: crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -n "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "present=true" >> "${GITHUB_OUTPUT}"
          else
            echo "present=false" >> "${GITHUB_OUTPUT}"
            echo "CARGO_REGISTRY_TOKEN secret is not set; skipping crates.io publish." >&2
          fi

      - name: Publish to crates.io
        if: steps.crates.outputs.present == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --allow-dirty --no-verify

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3
        with:
          files: |
            ${{ needs.build.outputs.archive }}
            ${{ needs.build.outputs.sbom }}
          generate_release_notes: true
          body: |
            ## Install via Homebrew

            ```sh
            brew install pallewela/tap/rusta
            ```

            ## Manual install

            ```sh
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ needs.build.outputs.tag }}/${{ needs.build.outputs.archive }} -o rusta.tar.gz
            tar -xzf rusta.tar.gz
            install -m 0755 rusta /usr/local/bin/rusta
            ```

            **SHA256** (`${{ needs.build.outputs.archive }}`):
            ```
            ${{ needs.build.outputs.sha256 }}
            ```

            ## Verifying provenance (SLSA)

            Each release ships a Sigstore-signed in-toto attestation
            (`*.intoto.jsonl`). Verify with
            [slsa-verifier](https://github.com/slsa-framework/slsa-verifier):

            ```sh
            slsa-verifier verify-artifact rusta.tar.gz \
              --provenance-path multiple.intoto.jsonl \
              --source-uri github.com/${{ github.repository }} \
              --source-tag ${{ needs.build.outputs.tag }}
            ```

      - name: Check tap token presence
        id: tap
        env:
          TAP_REPO_TOKEN: ${{ secrets.TAP_REPO_TOKEN }}
        run: |
          if [ -n "${TAP_REPO_TOKEN:-}" ]; then
            echo "present=true" >> "${GITHUB_OUTPUT}"
          else
            echo "present=false" >> "${GITHUB_OUTPUT}"
            echo "TAP_REPO_TOKEN secret is not set; skipping Homebrew tap bump." >&2
          fi

      - name: Bump Homebrew tap formula
        if: steps.tap.outputs.present == 'true'
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697  # v4
        with:
          token: ${{ secrets.TAP_REPO_TOKEN }}
          repository: pallewela/homebrew-tap
          event-type: rusta-release
          client-payload: |
            {
              "tag": "${{ needs.build.outputs.tag }}",
              "archive": "${{ needs.build.outputs.archive }}",
              "sha256": "${{ needs.build.outputs.sha256 }}",
              "url": "https://github.com/${{ github.repository }}/releases/download/${{ needs.build.outputs.tag }}/${{ needs.build.outputs.archive }}"
            }

  provenance:
    # SLSA reusable workflows are pinned by tag per SLSA's trust model.
    # Scorecard's Pinned-Dependencies check has an explicit exception for
    # slsa-framework/slsa-github-generator — do not pin to SHA here.
    needs: [build, release]
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.build.outputs.digests }}
      upload-assets: true
      upload-tag-name: ${{ needs.build.outputs.tag }}
